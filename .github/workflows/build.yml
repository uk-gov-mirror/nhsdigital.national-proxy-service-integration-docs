name: Build and deploy Eleventy to GitHub Pages

on:
    push:
        branches:
            - main

permissions:
    contents: read # allow checkout
    pages: write # required to deploy Pages
    id-token: write # required for some deployments (OIDC) and recommended

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22.x"

            - name: Install dependencies
              run: npm ci

            - name: Build Eleventy
              run: npm run build

            - name: Upload built site (Pages artifact)
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./_site

            - id: deployment
              name: Deploy to GitHub Pages
              uses: actions/deploy-pages@v4

            - name: Show published URL
              run: echo "Published at ${{ steps.deployment.outputs.page_url }}"
